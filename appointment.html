    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; background-color: #E0F2FE; margin: 0; }

        .hide-scroll::-webkit-scrollbar { display: none !important; width: 0 !important; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        #desktop-sidebar { width: 5.5rem; transition: width 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease; overflow-x: hidden; white-space: nowrap; }
        #desktop-sidebar:hover { width: 16rem; box-shadow: 10px 0 25px rgba(0,0,0,0.05); }
        #desktop-sidebar .nav-text { opacity: 0; transform: translateX(-10px); transition: all 0.2s ease; pointer-events: none; }
        #desktop-sidebar:hover .nav-text { opacity: 1; transform: translateX(0); transition-delay: 0.1s; pointer-events: auto; }
        #mobile-sidebar { transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
        #mobile-overlay { transition: opacity 0.3s ease; }

        .custom-select {
            appearance: none; background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2315518D' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M5 8l5 5 5-5'/%3e%3c/svg%3e");
            background-position: right 1rem center; background-repeat: no-repeat; background-size: 1.25em 1.25em;
        }
        .custom-select:focus { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%231A824A' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M15 12l-5-5-5 5'/%3e%3c/svg%3e"); }
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; transition: 0.2s; }
        input[type="date"]:hover::-webkit-calendar-picker-indicator { opacity: 1; }

        @keyframes slideDownFade { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-enter { animation: slideDownFade 0.6s ease forwards; }
        .animate-enter-delay { animation: slideDownFade 0.6s ease 0.15s forwards; opacity: 0; }
        
        .status-Pending { background-color: #fffbeb; color: #d97706; border: 1px solid #fde68a; }
        .status-Approved { background-color: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .status-Completed { background-color: #f8fafc; color: #475569; border: 1px solid #e2e8f0; }
        .status-Cancelled { background-color: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

        /* SEAT STYLES */
        .seat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 8px; }
        .seat { 
            width: 100%; aspect-ratio: 1; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-weight: 700; font-size: 16px; cursor: pointer; transition: all 0.2s ease; position: relative; overflow: hidden;
        }
        .seat i { font-size: 20px; margin-bottom: 2px; }
        
        /* Available Seat (Green) */
        .seat.available { background-color: #dcfce7; color: #166534; border: 2px solid #bbf7d0; }
        .seat.available:hover { background-color: #bbf7d0; transform: translateY(-2px); box-shadow: 0 4px 6px rgba(22, 101, 52, 0.1); }
        
        /* Taken Seat (Red) */
        .seat.taken { background-color: #fee2e2; color: #b91c1c; border: 2px solid #fecaca; cursor: not-allowed; opacity: 0.7; }
        
        /* Selected Seat (Blue) */
        .seat.selected { background-color: #15518D; color: white; border: 2px solid #0f3b68; transform: scale(1.05); box-shadow: 0 4px 12px rgba(21, 81, 141, 0.3); }
    </style>
</head>

    <script>
        function toggleMobileSidebar() {
            const sidebar = document.getElementById('mobile-sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.toggle('-translate-x-full');
            if(overlay.classList.contains('pointer-events-none')) {
                overlay.classList.remove('pointer-events-none', 'opacity-0');
            } else {
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('pointer-events-none'), 300);
            }
        }

        // Set minimum date to TODAY
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('apt-date').setAttribute('min', today);
    </script>

    <script type="module">
        let currentUserId = null;
        let currentUserName = "Citizen";

        const checkFirebase = setInterval(async () => {
            if (window.fbAuth && window.fbFunctions && window.fbDb) {
                clearInterval(checkFirebase);
                
                const { 
                    onAuthStateChanged, doc, getDoc, collection, addDoc, query, where, onSnapshot, serverTimestamp, getDocs
                } = window.fbFunctions;

                // 1. INITIALIZE USER & LOAD APPOINTMENTS
                onAuthStateChanged(window.fbAuth, async (user) => {
                    if (user) {
                        currentUserId = user.uid;

                        try {
                            const docRef = doc(window.fbDb, "profile", user.uid);
                            const docSnap = await getDoc(docRef);
                            if (docSnap.exists()) {
                                const data = docSnap.data();
                                currentUserName = `${data.first_name || ''} ${data.last_name || ''}`.trim() || "Citizen";
                            }
                        } catch (error) {}

                        // LISTEN TO USER'S APPOINTMENTS
                        const listContainer = document.getElementById('appointments-list');
                        const aptQuery = query(collection(window.fbDb, "appointments"), where("userId", "==", currentUserId));

                        onSnapshot(aptQuery, (snapshot) => {
                            if(snapshot.empty) {
                                listContainer.innerHTML = `
                                    <div class="text-center py-12 flex flex-col items-center justify-center h-full">
                                        <div class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mb-3">
                                            <i class="fa-regular fa-calendar-xmark text-2xl text-gray-300"></i>
                                        </div>
                                        <h3 class="text-base font-bold text-gray-700">No appointments found</h3>
                                        <p class="text-gray-400 text-xs mt-1">Book an appointment using the form on the left.</p>
                                    </div>
                                `;
                                return;
                            }

                            let apts = [];
                            snapshot.forEach(docSnap => apts.push({ id: docSnap.id, ...docSnap.data() }));
                            apts.sort((a, b) => new Date(a.date) - new Date(b.date));

                            listContainer.innerHTML = '';
                            apts.forEach(apt => {
                                const dateObj = new Date(apt.date);
                                const readableDate = dateObj.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
                                const statusClass = `status-${apt.status}`; 

                                const cardHTML = `
                                    <div class="p-4 md:p-5 rounded-2xl border border-gray-100 bg-gray-50 hover:bg-white hover:shadow-md transition-all flex flex-col sm:flex-row gap-4 sm:items-center justify-between">
                                        <div>
                                            <div class="flex items-center gap-2 mb-1">
                                                <h4 class="font-bold text-brand-primary text-base">${apt.department}</h4>
                                                <span class="text-[10px] font-bold px-2.5 py-0.5 rounded-full ${statusClass} uppercase tracking-wider">${apt.status}</span>
                                            </div>
                                            <p class="text-xs text-gray-500 font-medium flex flex-wrap items-center gap-2 mt-2">
                                                <span><i class="fa-regular fa-calendar text-brand-accent"></i> ${readableDate}</span>
                                                <span class="text-gray-300">|</span> 
                                                <span><i class="fa-regular fa-clock text-brand-accent"></i> ${apt.time}</span>
                                                <span class="text-gray-300">|</span> 
                                                <span class="bg-brand-primary text-white px-2 py-0.5 rounded-md"><i class="fa-solid fa-chair text-[10px]"></i> Seat ${apt.seatNumber}</span>
                                            </p>
                                        </div>
                                    </div>
                                `;
                                listContainer.insertAdjacentHTML('beforeend', cardHTML);
                            });
                        });

                    } else {
                        window.location.href = 'index.html';
                    }
                });

                // 2. CHECK AVAILABLE SEATS LOGIC
                window.checkSeats = async function() {
                    const dept = document.getElementById('apt-dept').value;
                    const date = document.getElementById('apt-date').value;
                    const time = document.getElementById('apt-time').value;
                    const container = document.getElementById('seat-container');
                    const grid = document.getElementById('seat-grid');
                    const seatInput = document.getElementById('apt-seat');
                    
                    // Reset selected seat
                    seatInput.value = '';

                    // Only show seats if Date and Time are selected
                    if(!date || !time) {
                        container.classList.add('hidden');
                        return;
                    }

                    container.classList.remove('hidden');
                    grid.innerHTML = '<p class="col-span-4 text-center text-sm text-gray-500 py-4"><i class="fa-solid fa-circle-notch fa-spin"></i> Checking seats...</p>';

                    try {
                        // Check Database for taken seats on this exact Date and Time
                        const q = query(
                            collection(window.fbDb, "appointments"), 
                            where("date", "==", date), 
                            where("time", "==", time)
                            // Note: Add 'where("department", "==", dept)' if seats are per department
                        );
                        
                        const snap = await getDocs(q);
                        const takenSeats = [];
                        snap.forEach(doc => {
                            if(doc.data().seatNumber) takenSeats.push(doc.data().seatNumber.toString());
                        });

                        // Generate 12 Seats
                        grid.innerHTML = '';
                        for(let i = 1; i <= 12; i++) {
                            const seatNum = i.toString();
                            const isTaken = takenSeats.includes(seatNum);
                            
                            const div = document.createElement('div');
                            div.className = `seat ${isTaken ? 'taken' : 'available'}`;
                            div.innerHTML = `<i class="fa-solid fa-chair"></i><span>${seatNum}</span>`;
                            
                            if(!isTaken) {
                                div.onclick = function() {
                                    // Deselect all
                                    document.querySelectorAll('.seat').forEach(s => s.classList.remove('selected'));
                                    // Select this one
                                    div.classList.add('selected');
                                    seatInput.value = seatNum;
                                };
                            }
                            grid.appendChild(div);
                        }
                    } catch(err) {
                        console.error(err);
                        grid.innerHTML = '<p class="col-span-4 text-center text-sm text-red-500 py-4">Error loading seats. Ensure Firestore rules allow reading appointments.</p>';
                    }
                };

                // 3. SUBMIT BOOKING
                window.submitAppointment = async function(e) {
                    e.preventDefault();
                    
                    const seatNumber = document.getElementById('apt-seat').value;
                    const msgBox = document.getElementById('apt-msg');

                    if(!seatNumber) {
                        msgBox.textContent = "Please select an available seat from the grid above.";
                        msgBox.className = "p-3 rounded-xl text-sm font-semibold text-center bg-red-50 text-red-600 block mt-1";
                        msgBox.classList.remove('hidden');
                        return;
                    }

                    const btn = document.getElementById('btn-book');
                    btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Submitting...';
                    btn.disabled = true; msgBox.classList.add('hidden');

                    try {
                        const newAppointment = {
                            userId: currentUserId,
                            userName: currentUserName,
                            department: document.getElementById('apt-dept').value,
                            date: document.getElementById('apt-date').value,
                            time: document.getElementById('apt-time').value,
                            seatNumber: seatNumber,
                            reason: document.getElementById('apt-reason').value,
                            status: "Pending", 
                            createdAt: serverTimestamp()
                        };

                        await addDoc(collection(window.fbDb, "appointments"), newAppointment);

                        msgBox.textContent = `Seat ${seatNumber} booked successfully! Wait for approval.`;
                        msgBox.className = "p-3 rounded-xl text-sm font-semibold text-center bg-green-50 text-brand-accent block mt-1";
                        
                        document.getElementById('appointment-form').reset();
                        document.getElementById('seat-container').classList.add('hidden');
                        document.getElementById('apt-seat').value = '';
                        
                        setTimeout(() => { msgBox.classList.add('hidden'); }, 4000);
                        
                    } catch (error) {
                        msgBox.textContent = "Error booking appointment. Please try again.";
                        msgBox.className = "p-3 rounded-xl text-sm font-semibold text-center bg-red-50 text-red-600 block mt-1";
                    } finally {
                        btn.innerHTML = '<i class="fa-regular fa-calendar-check"></i> Submit Booking Request';
                        btn.disabled = false;
                    }
                };

            }
        }, 50);
    </script>
</body>
</html>
